spring.application.name=water-delivery-backend

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/water_delivery?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=appuser
spring.datasource.password=apppass123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=water-delivery-backend
info.app.description=Backend system for employee-based delivery operations
info.app.version=1.0.0