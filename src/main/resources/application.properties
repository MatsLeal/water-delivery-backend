spring.application.name=water-delivery-backend

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.info.env.enabled=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# Logging
logging.level.root=INFO
logging.level.com.coreforge.waterdeliverybackend=DEBUG
logging.level.org.springframework.web=INFO
spring.mvc.log-resolved-exception=true
spring.mvc.log-request-details=true


info.app.name=water-delivery-backend
info.app.description=Backend system for employee-based delivery operations
info.app.version=1.0.0



